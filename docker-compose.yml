services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: afois
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      ENV: dev
      LOG_LEVEL: INFO
      PYTHONPATH: /app/src
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/afois
      CHROMA_PERSIST_DIRECTORY: /data/chroma_db
      LLM_PROVIDER: "${LLM_PROVIDER:-auto}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o-mini}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-1.5-flash-latest}"
      GEMINI_FALLBACK_MODEL: "${GEMINI_FALLBACK_MODEL:-}"
      LLM_AUTO_FAILOVER: "${LLM_AUTO_FAILOVER:-false}"
      LLM_RATE_LIMIT_FALLBACK_REPLY: "${LLM_RATE_LIMIT_FALLBACK_REPLY:-}"
      ADMIN_REINDEX_TOKEN: "${ADMIN_REINDEX_TOKEN:-}"
      LANGSMITH_TRACING: "${LANGSMITH_TRACING:-false}"
      LANGSMITH_API_KEY: "${LANGSMITH_API_KEY:-}"
      LANGSMITH_PROJECT: "${LANGSMITH_PROJECT:-afois}"
    volumes:
      - chroma:/data/chroma_db
      - appdata:/app/data
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    image: node:22-bookworm-slim
    working_dir: /app
    volumes:
      - ./web:/app
    ports:
      - "3000:3000"
    environment:
      # Next.js rewrites /afois-api → API (from inside this container).
      AFOIS_BACKEND_URL: http://api:8000
    command: sh -c "npm ci && npm run dev -- --hostname 0.0.0.0 --port 3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  chroma:
  appdata:
